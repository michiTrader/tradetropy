[pytest]

# Esta línea es la que soluciona tu error de importación
pythonpath = src

# Marcadores personalizados
markers =
    unit: tests unitarios rápidos (< 1s)
    slow: tests lentos que pueden tardar más tiempo
    integration: tests de integración con servicios externos
    smoke: tests de smoke testing básicos
    
# Opciones adicionales útiles
testpaths = src/test
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Warning filters
# The "Stats: muestra insuficiente" UserWarning is intentional production
# behavior (stats/stats.py): a backtest that is too short or has < 2 closed
# trades cannot compute annualized/trade metrics, so they are set to NaN and a
# warning is emitted. Test datasets are deliberately tiny, so this warning is
# expected noise here. Silence just this message (matched with a regex; the '.'
# stands for the literal ':' in "Stats:", since pytest splits filters on ':').
# It does NOT hide other warnings, and pytest.warns() still catches it inside
# its own block (test_stats.py asserts the warning IS emitted).
filterwarnings =
    ignore:Stats. muestra insuficiente:UserWarning
addopts = 
    -v
    --strict-markers
    --benchmark-columns=min,mean,ops
    --tb=short
